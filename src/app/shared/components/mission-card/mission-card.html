<article class="h-100">
  <div class="card mission-card h-100 border-0 shadow-sm rounded-4">
    <div class="card-body p-4 p-lg-5">
      <div
        class="mission-icon rounded-circle d-inline-flex align-items-center justify-content-center mb-4"
      >
        <i aria-hidden="true" [class]="icon() + ' fs-3'"></i>
      </div>

      <h3 class="h4 fw-bold text-brand mb-3">{{ title() }}</h3>

      <p class="text-secondary mb-0">{{ description() }}</p>
    </div>
  </div>
</article>
