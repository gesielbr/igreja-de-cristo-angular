<article class="h-100">
  <div class="card h-100 border-0 shadow-sm hover-lift {{ bgClass() }}">
    <div class="card-body p-4 d-flex flex-column">
      <i aria-hidden="true" class="{{ icon() }} text-gold fs-1"></i>
      <h3 class="h5 text-brand mt-3">{{ title() }}</h3>
      <p class="text-secondary mb-0 flex-grow-1">{{ description() }}</p>
    </div>
  </div>
</article>
