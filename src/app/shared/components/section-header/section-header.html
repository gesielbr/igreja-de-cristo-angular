<header class="text-center mx-auto mb-5" style="max-width: 46rem">
  <span class="section-kicker">{{ kicker() }}</span>
  <h2 class="display-6 fw-bold text-brand" [id]="id()">
    {{ title() }}
  </h2>
  <span aria-hidden="true" class="gold-rule d-block mx-auto my-3"></span>
  <p class="text-secondary">{{ description() }}</p>
</header>
