<app-page-layout>
  <app-content-hero
    currentPage="Eventos"
    subtitle="Programação"
    title="Eventos e cultos"
    description="Confira os cultos, estudos bíblicos e encontros semanais da Igreja de Cristo."
  />

  <app-section-container
    bgClass="bg-soft"
    sectionId="eventos"
    labelledBy="eventos"
    kicker="Nossa programação"
    title="Cultos e encontros semanais"
    description="Todos os nossos eventos são abertos ao público e pensados para acolher você e sua família em um ambiente de comunhão e adoração."
    headerId="eventos"
    headerMaxWidth="46rem"
  >
    <div class="row g-4">
      @for (event of events(); track event.id) {
        <div class="col-xl-6">
          <app-event-card [event]="event" />
        </div>
      }
    </div>
  </app-section-container>
  <!-- NOVA SEÇÃO: Programação em tabela -->
  <app-section-container
    bgClass="bg-white"
    sectionId="programacao"
    labelledBy="programacao"
    kicker="Agenda fixa"
    title="Programação"
    description="Nossa programação semanal fixa para você se programar e participar conosco."
    headerId="programacao"
    headerMaxWidth="46rem"
  >
    <app-schedule />
  </app-section-container>
</app-page-layout>
