<app-page-layout>
  <app-content-hero
    [currentPage]="pageConfig.currentPage"
    [subtitle]="pageConfig.subtitle"
    [title]="pageConfig.title"
    [description]="pageConfig.description"
  />

  <app-section-side-title
    bgClass="bg-white"
    sectionId="intro-igrejas"
    labelledBy="intro-igrejas"
    kicker="Comunidades locais"
    title="Uma fé vivida em comunidade"
    description="A Igreja de Cristo está presente em comunidades locais que se reúnem para adorar a Deus, estudar a Bíblia, servir pessoas e anunciar o evangelho de Jesus Cristo."
    subDescription="Esta página organiza as igrejas por Estado para ajudar você a encontrar uma comunidade próxima, conhecer sua programação e entrar em contato com uma igreja local."
    headerId="intro-igrejas"
    leftColumnClass="col-12 col-lg-7"
    rightColumnClass="col-12 col-lg-5"
  >
    <app-section-card
      icon="bi bi-geo-alt-fill"
      title="Encontre uma igreja local"
      description="As comunidades estão organizadas por Estado. Conforme o site crescer, novas igrejas locais poderão ser adicionadas nesta página."
      bgClass="bg-soft"
    />
  </app-section-side-title>
  <app-section-container
    bgClass="bg-light"
    sectionId="igrejas-por-estado"
    labelledBy="igrejas-por-estado"
    kicker="Por Estado"
    title="Localidades da Igreja de Cristo"
    description="Veja abaixo comunidades locais da Igreja de Cristo já cadastradas no site, organizadas por Estado, com endereço, contato e canais oficiais."
    headerId="igrejas-por-estado"
    headerMaxWidth="48rem"
  >
    <!-- Aqui virá o conteúdo das igrejas organizadas por estado -->
    <div class="row g-4">
      <p class="text-center text-muted">Listagem de igrejas por estado em breve...</p>
    </div>
  </app-section-container>
</app-page-layout>
