<app-page-layout>
  <app-content-hero
    [currentPage]="pageConfig.currentPage"
    [subtitle]="pageConfig.subtitle"
    [title]="pageConfig.title"
    [description]="pageConfig.description"
  />

  <app-section-side-title
    bgClass="bg-white"
    sectionId="intro-igrejas"
    labelledBy="intro-igrejas"
    kicker="Comunidades locais"
    title="Uma fé vivida em comunidade"
    description="A Igreja de Cristo está presente em comunidades locais que se reúnem para adorar a Deus, estudar a Bíblia, servir pessoas e anunciar o evangelho de Jesus Cristo."
    subDescription="Esta página organiza as igrejas por Estado para ajudar você a encontrar uma comunidade próxima, conhecer sua programação e entrar em contato com uma igreja local."
    headerId="intro-igrejas"
  >
    <app-section-card
      icon="bi bi-geo-alt-fill"
      title="Encontre uma igreja local"
      description="As comunidades estão organizadas por Estado. Conforme o site crescer, novas igrejas locais poderão ser adicionadas nesta página."
      bgClass="bg-soft"
    />
  </app-section-side-title>

  <app-section-container
    bgClass="bg-white"
    sectionId="igrejas-por-estado"
    labelledBy="igrejas-por-estado"
    kicker="Por Estado"
    title="Localidades da Igreja de Cristo"
    description="Veja abaixo comunidades locais da Igreja de Cristo já cadastradas no site, organizadas por Estado, com endereço, contato e canais oficiais."
    headerId="igrejas-por-estado"
    headerMaxWidth="48rem"
  >
    <div class="accordion d-grid gap-4" id="accordionEstados">
      <app-accordion-estado
        [estado]="igrejasData.santaCatarina.estado"
        [igrejas]="igrejasData.santaCatarina.igrejas"
        [aberto]="igrejasData.santaCatarina.aberto"
        [id]="'santa-catarina'"
      >
        <!-- Aqui virá o SectionCard para cada igreja -->
        <ng-template let-igreja>
          <app-section-card
            [icon]="'bi bi-geo-alt'"
            [title]="igreja.nome"
            [description]="igreja.descricao"
            [bgClass]="'bg-white'"
          />
        </ng-template>
      </app-accordion-estado>
    </div>
  </app-section-container>
  <app-section-side-title
    bgClass="bg-white"
    sectionId="cadastrar-congregacao"
    labelledBy="cadastrar-congregacao"
    kicker="Sua congregação"
    title="Quer colocar sua igreja nesta página?"
    description="Se você participa de uma congregação da Igreja de Cristo e deseja incluir as informações da comunidade neste site, entre em contato pelo WhatsApp."
    subDescription="A ideia é manter uma página organizada, clara e útil para quem procura uma Igreja de Cristo no Brasil."
    headerId="cadastrar-congregacao"
  >
    <app-section-card
      icon="bi bi-plus-circle"
      title="Cadastrar congregação"
      description="Envie uma mensagem para solicitar a inclusão da sua igreja local ou atualizar as informações."
      bgClass="bg-soft"
    />
  </app-section-side-title>
</app-page-layout>
