<app-hero [slides]="heroSlides" />

<!-- Seção: Nossa identidade -->
<app-section-container
  bgClass="bg-white"
  sectionId="acolhimento"
  labelledBy="acolhimento"
  kicker="Nossa identidade"
  title="Uma igreja firmada em Cristo e na Palavra de Deus"
  description="A Igreja de Cristo existe para glorificar a Deus, anunciar o Evangelho de Jesus Cristo, ensinar a Bíblia e promover comunhão entre irmãos em diferentes comunidades locais."
  headerId="acolhimento"
  headerMaxWidth="46rem"
>
  <div class="row g-4">
    <div class="col">
      <app-section-card
        icon="bi bi-plus-lg"
        title="Cristo"
        description="Jesus Cristo é o fundamento da nossa fé, da nossa esperança e da nossa missão."
      />
    </div>
    <div class="col">
      <app-section-card
        icon="bi bi-people"
        title="Evangelho"
        description="Anunciamos a boa notícia da salvação, chamando pessoas a conhecerem a graça e o amor de Deus."
      />
    </div>
    <div class="col">
      <app-section-card
        icon="bi bi-book"
        title="Bíblia"
        description="Buscamos viver e ensinar a Palavra de Deus com fidelidade, simplicidade e amor."
      />
    </div>
  </div>
</app-section-container>
