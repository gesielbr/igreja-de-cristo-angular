<!-- Skip link -->
<a
  class="visually-hidden-focusable btn btn-gold position-absolute top-0 start-0 m-2 z-3"
  href="#conteudo-principal"
>
  Pular para o conteúdo
</a>

<!-- Header mobile -->
<header class="d-lg-none sticky-top bg-brand shadow-sm">
  <nav
    aria-label="Navegação principal mobile"
    class="navbar navbar-dark px-3 d-flex flex-nowrap align-items-center justify-content-between"
  >
    <a
      aria-label="Igreja de Cristo - página inicial"
      class="navbar-brand d-flex align-items-center me-2 mb-0 flex-shrink-1"
      routerLink="/"
    >
      <img
        class="img-fluid"
        src="public/assets/img/novo-logo-white-300x120.webp"
        alt="Logo Igreja de Cristo"
        style="max-height: 64px; width: auto"
      />
    </a>

    <button
      aria-controls="menuMobile"
      aria-label="Abrir menu principal"
      class="navbar-toggler flex-shrink-0"
      data-bs-target="#menuMobile"
      data-bs-toggle="offcanvas"
      type="button"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
  </nav>

  <div
    aria-labelledby="menuMobileLabel"
    class="offcanvas offcanvas-start text-bg-dark"
    id="menuMobile"
    tabindex="-1"
  >
    <div class="offcanvas-header border-bottom border-secondary">
      <p class="offcanvas-title fs-5 mb-0" id="menuMobileLabel">Igreja de Cristo</p>

      <button
        aria-label="Fechar menu"
        class="btn-close btn-close-white"
        data-bs-dismiss="offcanvas"
        type="button"
      ></button>
    </div>

    <nav aria-label="Menu mobile" class="offcanvas-body">
      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link sidebar-link rounded-3 px-3 py-2"
            aria-current="page"
          >
            <i aria-hidden="true" class="bi bi-house-door me-2"></i>
            Início
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/quem-somos"
            routerLinkActive="active"
            class="nav-link sidebar-link rounded-3 px-3 py-2"
          >
            <i aria-hidden="true" class="bi bi-people me-2"></i>
            Quem Somos
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/igrejas"
            routerLinkActive="active"
            class="nav-link sidebar-link rounded-3 px-3 py-2"
          >
            <i aria-hidden="true" class="bi bi-geo-alt me-2"></i>
            Encontre sua igreja
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/eventos"
            routerLinkActive="active"
            class="nav-link sidebar-link rounded-3 px-3 py-2"
          >
            <i aria-hidden="true" class="bi bi-calendar-event me-2"></i>
            Eventos
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/galeria"
            routerLinkActive="active"
            class="nav-link sidebar-link rounded-3 px-3 py-2"
          >
            <i aria-hidden="true" class="bi bi-images me-2"></i>
            Galeria
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/contato"
            routerLinkActive="active"
            class="nav-link sidebar-link rounded-3 px-3 py-2"
          >
            <i aria-hidden="true" class="bi bi-chat-dots me-2"></i>
            Contato
          </a>
        </li>
      </ul>

      <hr class="border-secondary my-4" />

      <app-cta-aside [sections]="ctaSections" variant="mobile"></app-cta-aside>
    </nav>
  </div>
</header>

<div class="container-fluid p-0">
  <div class="row g-0">
    <!-- Sidebar desktop -->
    <aside
      aria-label="Navegação e informações da igreja"
      class="col-lg-3 d-none d-lg-flex sidebar bg-brand text-white min-vh-100 sticky-top flex-column p-4"
    >
      <a
        aria-label="Igreja de Cristo - página inicial"
        class="d-flex align-items-center justify-content-center gap-3 text-white text-decoration-none mb-3"
        routerLink="/"
      >
        <img
          alt="Logo Igreja de Cristo"
          class="img-fluid"
          src="assets/img/novo-logo-white-300x120.webp"
          style="max-width: 100%; height: auto; max-height: 80px"
        />
      </a>

      <nav aria-label="Navegação principal">
        <ul class="nav flex-column gap-1">
          <li class="nav-item">
            <a
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link sidebar-link rounded-3 px-3 py-2"
              aria-current="page"
            >
              <i class="bi bi-house-door me-2"></i>
              Início
            </a>
          </li>

          <li class="nav-item">
            <a
              routerLink="/quem-somos"
              routerLinkActive="active"
              class="nav-link sidebar-link rounded-3 px-3 py-2"
            >
              <i class="bi bi-people me-2"></i>
              Quem Somos
            </a>
          </li>

          <li class="nav-item">
            <a
              routerLink="/igrejas"
              routerLinkActive="active"
              class="nav-link sidebar-link rounded-3 px-3 py-2"
            >
              <i class="bi bi-geo-alt me-2"></i>
              Encontre sua igreja
            </a>
          </li>

          <li class="nav-item">
            <a
              routerLink="/eventos"
              routerLinkActive="active"
              class="nav-link sidebar-link rounded-3 px-3 py-2"
            >
              <i class="bi bi-calendar-event me-2"></i>
              Eventos
            </a>
          </li>

          <li class="nav-item">
            <a
              routerLink="/galeria"
              routerLinkActive="active"
              class="nav-link sidebar-link rounded-3 px-3 py-2"
            >
              <i class="bi bi-images me-2"></i>
              Galeria
            </a>
          </li>

          <li class="nav-item">
            <a
              routerLink="/contato"
              routerLinkActive="active"
              class="nav-link sidebar-link rounded-3 px-3 py-2"
            >
              <i class="bi bi-chat-dots me-2"></i>
              Contato
            </a>
          </li>
        </ul>
      </nav>

      <app-cta-aside [sections]="ctaSections"></app-cta-aside>
    </aside>

    <!-- Conteúdo principal -->
    <main class="col-12 col-lg-9 d-flex flex-column min-vh-100" id="conteudo-principal">
      <ng-content></ng-content>
    </main>
  </div>
</div>
